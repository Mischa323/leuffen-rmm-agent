name: Build Windows agent MSI

# Builds a standalone agent .exe (PyInstaller) and wraps it in an MSI (WiX v5).
# Runs on a Windows runner — free for public repositories. The MSI is published
# to a GitHub Release (v1.0.0 on manual runs, or the pushed tag).
#
# Optional code signing: if the repo has secrets WINDOWS_CERT_PFX_BASE64 (a
# base64-encoded .pfx code-signing cert) and WINDOWS_CERT_PASSWORD, the exe and
# MSI are Authenticode-signed (removes the "Unknown publisher" warning).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-msi:
    runs-on: windows-latest
    env:
      HAS_CERT: ${{ secrets.WINDOWS_CERT_PFX_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          # The agent versions itself, independently of the server. Source of
          # truth is AGENT_VERSION in agent/inventory.py.
          $v = ((Get-Content agent/inventory.py -Raw) -match 'AGENT_VERSION\s*=\s*"([^"]+)"') `
               ? $Matches[1] : '0.0.0'
          "ver=$v"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          # MSI ProductVersion = the agent version. MSI ignores the 4th field for
          # upgrade detection, so each release supersedes the previous one as long
          # as major.minor.patch increases (auto-version bumps the patch).
          "msi=$v.0" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        # 'av' (PyAV) provides H.264 encoding for the remote-desktop stream; it
        # bundles ffmpeg (~30-50 MB). The agent falls back to JPEG without it.
        run: pip install pyinstaller websockets psutil pystray pillow mss pynput av

      - name: Generate app icon
        # The .ico is drawn programmatically (no binary committed to the repo).
        run: python packaging/windows/make_icon.py

      - name: Fetch LibreHardwareMonitor (accurate Windows CPU temps)
        # Bundled into the exe so the agent can read the CPU die sensor (the DLL
        # carries an embedded kernel driver). Pulled at build time from NuGet so
        # no binaries are committed to the repo.
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tmp = Join-Path $env:RUNNER_TEMP 'lhm'
          New-Item -ItemType Directory -Force $tmp | Out-Null
          function Fetch($url, $name, $match) {
            $zip = Join-Path $tmp "$name.zip"
            Invoke-WebRequest -Uri $url -OutFile $zip
            $dest = Join-Path $tmp $name
            Expand-Archive -Path $zip -DestinationPath $dest -Force
            $dll = Get-ChildItem $dest -Recurse -Filter "$name.dll" |
                   Where-Object { $_.FullName -match $match } | Select-Object -First 1
            if (-not $dll) { throw "Could not find $name.dll ($match) in package" }
            Copy-Item $dll.FullName (Join-Path 'packaging\windows' "$name.dll") -Force
            Write-Host "bundled $name.dll <- $($dll.FullName)"
          }
          Fetch 'https://www.nuget.org/api/v2/package/LibreHardwareMonitorLib/0.9.4' 'LibreHardwareMonitorLib' 'net472'
          Fetch 'https://www.nuget.org/api/v2/package/HidSharp/2.1.0' 'HidSharp' 'net35'

      - name: Fetch MAC vendor database (accurate network-scan vendor names)
        # Bundled so node scans can name device vendors without nmap installed.
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest -Uri 'https://raw.githubusercontent.com/nmap/nmap/master/nmap-mac-prefixes' `
            -OutFile 'packaging\windows\nmap-mac-prefixes'
          Write-Host "bundled nmap-mac-prefixes ($((Get-Item 'packaging\windows\nmap-mac-prefixes').Length) bytes)"

      - name: Build agent exe
        working-directory: agent
        # --onedir (not --onefile): a self-extracting onefile exe is the biggest
        # trigger for Defender's Bearfoos.B!ml ML false positive on PyInstaller
        # apps. Onedir ships a plain folder (exe + _internal\) instead.
        # --collect-all av bundles PyAV's ffmpeg DLLs (H.264 encode); without it
        # the agent still runs and falls back to JPEG.
        run: pyinstaller --onedir --noconsole --icon ..\packaging\windows\leuffen.ico --name leuffen-rmm-agent --paths . --collect-submodules mss --collect-submodules pynput --collect-all av --hidden-import PIL.Image --add-data "..\packaging\windows\LibreHardwareMonitorLib.dll;." --add-data "..\packaging\windows\HidSharp.dll;." --add-data "..\packaging\windows\nmap-mac-prefixes;." agent.py

      - name: Build tray exe
        working-directory: agent
        run: pyinstaller --onefile --noconsole --icon ..\packaging\windows\leuffen.ico --name leuffen-rmm-tray --paths . tray.py

      - name: Prepare signing certificate
        if: env.HAS_CERT == 'true'
        env:
          PFX: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:PFX))
          $st = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                 Sort-Object FullName -Descending | Select-Object -First 1).FullName
          "SIGNTOOL=$st" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Sign agent + tray exe
        if: env.HAS_CERT == 'true'
        env:
          PW: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: >
          & "$env:SIGNTOOL" sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:PW"
          /fd sha256 /tr http://timestamp.sectigo.com /td sha256
          agent\dist\leuffen-rmm-agent\leuffen-rmm-agent.exe agent\dist\leuffen-rmm-tray.exe

      - name: Install WiX
        # Pin to v5 — v6/v7 require accepting the Open Source Maintenance Fee EULA.
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI
        run: |
          # Stage the PyInstaller onedir payload (exe + _internal\*) plus the tray
          # exe into one folder for WiX to harvest (<Files Include="app\**">).
          New-Item -ItemType Directory -Force packaging\windows\app | Out-Null
          Copy-Item agent\dist\leuffen-rmm-agent\* packaging\windows\app\ -Recurse -Force
          Copy-Item agent\dist\leuffen-rmm-tray.exe packaging\windows\app\leuffen-rmm-tray.exe -Force
          # Stamp the MSI version from AGENT_VERSION, so 'newest' is visible in
          # Programs & Features and upgrades are monotonic.
          (Get-Content packaging\windows\agent.wxs) -replace 'Version="1.0.0.0"', 'Version="${{ steps.ver.outputs.msi }}"' | Set-Content packaging\windows\agent.wxs
          wix build packaging\windows\agent.wxs -b packaging\windows -o leuffen-rmm-agent.msi

      - name: Sign MSI
        if: env.HAS_CERT == 'true'
        env:
          PW: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: >
          & "$env:SIGNTOOL" sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:PW"
          /fd sha256 /tr http://timestamp.sectigo.com /td sha256
          leuffen-rmm-agent.msi

      - uses: actions/upload-artifact@v4
        with:
          name: leuffen-rmm-agent-msi
          path: leuffen-rmm-agent.msi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.ver.outputs.ver) }}
          # Release name carries the actual MSI version so the dashboard can show it.
          name: Leuffen RMM Agent ${{ steps.ver.outputs.msi }}
          files: leuffen-rmm-agent.msi
          fail_on_unmatched_files: true
