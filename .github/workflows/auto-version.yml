name: Auto-bump version

# Increments the agent's patch version on every push to main that touches agent/.
# AGENT_VERSION in agent/inventory.py is the single source of truth. The bump is
# committed back to main with the default token (which does not retrigger
# workflows, so there is no loop).

on:
  push:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: auto-version
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip the bot's own bump commits.
    if: "!contains(github.event.head_commit.message, '[version bump]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed paths
        id: changes
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-parse HEAD~1 2>/dev/null || echo HEAD)"
          fi
          FILES="$(git diff --name-only "$BEFORE" "${{ github.sha }}" || true)"
          echo "agent=$(echo "$FILES" | grep -q '^agent/' && echo yes || echo no)" >> "$GITHUB_OUTPUT"

      - name: Bump agent version
        if: steps.changes.outputs.agent == 'yes'
        run: |
          cur="$(grep -oP 'AGENT_VERSION\s*=\s*"\K[^"]+' agent/inventory.py)"
          IFS=. read -r MA MI PA <<< "$cur"
          new="$MA.$MI.$((PA + 1))"
          sed -i "s/AGENT_VERSION = \"$cur\"/AGENT_VERSION = \"$new\"/" agent/inventory.py
          echo "Agent: $cur -> $new"

      - name: Commit bump
        run: |
          if git diff --quiet; then
            echo "No version change needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agent/inventory.py
          git commit -m "chore: auto version bump [version bump]"
          git push origin HEAD:main
